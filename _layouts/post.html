<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <meta name="format-detection" content="telephone=no" />
        <title>{{ page.title }} | SanguineChameleon</title>
        <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Mono:wght@100..900&display=swap" rel="stylesheet" />
        <link href="/assets/css/styles.css" rel="stylesheet" />
        <script>
            MathJax = {
                tex: {
                    inlineMath: [
                        ["$", "$"],
                        ["\\(", "\\)"],
                    ],
                    displayMath: [
                        ["$$", "$$"],
                        ["\\[", "\\]"],
                    ],
                },
                svg: {
                    fontCache: "global",
                    scale: 0.9,
                },
            };
        </script>
        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    </head>
    <body>
        <div class="body-container">
            <div class="header">
                <a href="/leon"><span class="red">sanguine</span><span class="green">cha</span>.<span class="green">me</span>/<span class="green">leon</span></a>
            </div>
            <nav class="header-nav">
                <ul class="header-nav-left">
                    <li><a href="/leon">About</a></li
                    ><li><a href="/all">All Posts</a></li>
                </ul>
                {% if page.collection == "posts" %}
                <script>
                    let otherPosts = [
                        {% for post in site.posts %}
                        {% if post.url != page.url %}
                        "{{ post.url }}",
                        {% endif %}
                        {% endfor %}
                    ];
                    function goToRandom() {
                        if (otherPosts.length == 0) {
                            return;
                        }
                        let id = Math.floor(Math.random() * otherPosts.length);
                        window.location.href = otherPosts[id];
                    }
                </script>
                <ul class="header-nav-right">
                    <li><a href="{{ site.posts.last.url }}"><<</a></li
                    ><li><a href="{{ page.previous.url }}"><</a></li
                    ><li><button type="button" onclick="goToRandom()">?</button></li
                    ><li><a href="{{ page.next.url }}">></a></li
                    ><li><a href="{{ site.posts.first.url }}">>></a></li>
                </ul>
                {% endif %}
            </nav>
            <div class="post">
                <h1>{{ page.title }}</h1>
                {% if page.collection == "posts" %}
                <div class="date">{{ page.date | date: "%d-%b-%Y"}}</div>
                {% endif %} {{ content }}
            </div>
            <nav class="footer-nav">
                <ul class="footer-nav-right">
                    <li><button type="button" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">Back to Top</button></li>
                </ul>
            </nav>
        </div>
    </body>
</html>
